{% extends "layout.html" %}
{% block content %}
        <div class="container">
            <div class="full_post">
                <img class="profile_pic" src="{{ url_for('static', path='profile_pics/defaultavatar.jpg') }}" alt="A profile picture of {{ post.author }}">
                <div class="post-content">
                <div class="author-and-date">
                    <a class="author" href="#">{{ post.author }}</a>
                    <small class="date_posted">{{ post.date_posted }}</small>
                </div>
                <hr class="post-line">
                <h2>
                <a class="title" href="#">{{ post.title }}</a>
                </h2>
                <p class="content">{{ post.content }}</p>
                <hr class="post-line">
                <div class="post-buttons">
                    <button id="edit-button">Edit Post</button>
                    <button id="delete-button">Delete Post</button>
                </div>
            </div>
            </div>
        </div>
{% endblock content %}
